<?xml version="1.0" encoding="UTF-8"?>
<!--
  SlothMove Logo Concept B: "Re-skinned Mascot"
  Concept: เอา mascot สลอธเดิมมาปรับให้ใช้สี brand (amber+navy) + ลด detail
  ทำ 2 version ในไฟล์เดียว: full (บน) + minimal mark (ล่าง)
-->
<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d44"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c97d3a"/>
      <stop offset="100%" stop-color="#8b5e3c"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1200" fill="#faf8f4"/>

  <!-- ===== VERSION 1: FULL MASCOT (เหมือนเดิม แต่ใช้สี amber) ===== -->
  <g transform="translate(400 320)">

    <!-- Background circle -->
    <circle cx="0" cy="0" r="280" fill="url(#bgGrad2)"/>

    <!-- Subtle inner ring -->
    <circle cx="0" cy="0" r="240" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- Body -->
    <ellipse cx="0" cy="30" rx="80" ry="95" fill="url(#bodyGrad)" opacity="0.95"/>

    <!-- Head -->
    <circle cx="0" cy="-80" r="58" fill="#e8a87c"/>

    <!-- Face mask -->
    <ellipse cx="0" cy="-68" rx="38" ry="32" fill="#faf8f4" opacity="0.85"/>

    <!-- Eyes (closed/sleepy - เปลี่ยนจาก dot เป็นเส้นโค้ง) -->
    <path d="M -22 -75 Q -14 -68 -6 -75"
          stroke="#1a1a2e" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M 6 -75 Q 14 -68 22 -75"
          stroke="#1a1a2e" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-65" rx="7" ry="5" fill="#1a1a2e"/>

    <!-- Smile -->
    <path d="M -10 -52 Q 0 -45 10 -52"
          stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Ears -->
    <circle cx="-52" cy="-95" r="20" fill="#8b5e3c"/>
    <circle cx="52" cy="-95" r="20" fill="#8b5e3c"/>

    <!-- Arms -->
    <path d="M -65 -10 Q -100 30 -110 100 Q -113 120 -100 128"
          stroke="url(#bodyGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M 65 -10 Q 100 30 110 100 Q 113 120 100 128"
          stroke="url(#bodyGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>

    <!-- Claws -->
    <path d="M -105 128 Q -113 142 -122 138"
          stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 105 128 Q 113 142 122 138"
          stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Leaf accent (brand touch) -->
    <ellipse cx="-60" cy="-140" rx="14" ry="8"
             fill="#7a9470" opacity="0.7"
             transform="rotate(-30 -60 -140)"/>
    <ellipse cx="60" cy="-140" rx="14" ry="8"
             fill="#7a9470" opacity="0.7"
             transform="rotate(30 60 -140)"/>

    <!-- Text inside badge -->
    <text x="0" y="200"
          font-family="'Kanit', sans-serif"
          font-weight="900"
          font-size="48"
          fill="#faf8f4"
          text-anchor="middle"
          letter-spacing="-0.5">Sloth<tspan fill="#e8a87c">Move</tspan></text>
  </g>

  <!-- Divider -->
  <line x1="200" y1="700" x2="600" y2="700" stroke="#e5e0d8" stroke-width="2"/>

  <!-- Label -->
  <text x="200" y="730" font-family="'Sarabun', sans-serif" font-size="16" fill="#7a756d">↓ Minimal mark version (ใช้เป็น favicon/avatar)</text>

  <!-- ===== VERSION 2: MINIMAL MARK (เรียบ ไม่มี text) ===== -->
  <g transform="translate(400 950)">

    <!-- Just the sloth head silhouette, no background -->
    <!-- Head shape -->
    <path d="M -100 -30
             Q -100 -100 -50 -110
             Q 0 -115 50 -110
             Q 100 -100 100 -30
             Q 100 50 50 80
             Q 0 95 -50 80
             Q -100 50 -100 -30 Z"
          fill="#1a1a2e"/>

    <!-- Face mask -->
    <ellipse cx="0" cy="-10" rx="65" ry="50" fill="#faf8f4"/>

    <!-- Eyes -->
    <path d="M -38 -25 Q -26 -14 -14 -25"
          stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 14 -25 Q 26 -14 38 -25"
          stroke="#1a1a2e" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-5" rx="10" ry="7" fill="#c97d3a"/>

    <!-- Smile -->
    <path d="M -18 25 Q 0 38 18 25"
          stroke="#1a1a2e" stroke-width="5" stroke-linecap="round" fill="none"/>

    <!-- Ears -->
    <circle cx="-78" cy="-60" r="22" fill="#1a1a2e"/>
    <circle cx="78" cy="-60" r="22" fill="#1a1a2e"/>

    <!-- Amber leaf on top (brand accent) -->
    <ellipse cx="-20" cy="-105" rx="20" ry="10"
             fill="#c97d3a"
             transform="rotate(-25 -20 -105)"/>
  </g>

  <!-- Footer wordmark -->
  <text x="400" y="1110"
        font-family="'Kanit', sans-serif"
        font-weight="900"
        font-size="64"
        fill="#1a1a2e"
        text-anchor="middle"
        letter-spacing="-1">Sloth<tspan fill="#c97d3a">Move</tspan></text>
  <text x="400" y="1145"
        font-family="'Sarabun', sans-serif"
        font-weight="500"
        font-size="14"
        fill="#7a756d"
        text-anchor="middle"
        letter-spacing="6">E · L E A R N I N G</text>
</svg>