<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcec4a"/>
      <stop offset="100%" stop-color="#ddcf00"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="24" fill="url(#bg)"/>
  <!-- Book pages background -->
  <rect x="35" y="50" width="130" height="100" rx="6" fill="#1a1a2e" stroke="url(#gold)" stroke-width="2"/>
  <line x1="100" y1="50" x2="100" y2="150" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Lines on left page -->
  <line x1="45" y1="65" x2="92" y2="65" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="75" x2="92" y2="75" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="85" x2="80" y2="85" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="95" x2="92" y2="95" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="105" x2="75" y2="105" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="115" x2="92" y2="115" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="125" x2="85" y2="125" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="135" x2="92" y2="135" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <!-- Lines on right page -->
  <line x1="108" y1="65" x2="155" y2="65" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="75" x2="155" y2="75" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="85" x2="140" y2="85" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="95" x2="155" y2="95" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="105" x2="130" y2="105" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="115" x2="155" y2="115" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="125" x2="148" y2="125" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="135" x2="155" y2="135" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <!-- Crown above book -->
  <g transform="translate(100, 32)">
    <path d="M-22 8 L-22 -4 L-14 0 L-7 -10 L0 -2 L7 -10 L14 0 L22 -4 L22 8 Z" fill="url(#gold)" stroke="#1a1a2e" stroke-width="1"/>
    <circle cx="-14" cy="-3" r="2" fill="#1a1a2e"/>
    <circle cx="0" cy="-7" r="2" fill="#1a1a2e"/>
    <circle cx="14" cy="-3" r="2" fill="#1a1a2e"/>
  </g>
  <!-- Banner -->
  <rect x="50" y="160" width="100" height="20" rx="3" fill="url(#gold)"/>
  <text x="100" y="174" text-anchor="middle" font-family="Kanit, sans-serif" font-size="12" font-weight="800" fill="#1a1a2e">ก.พ. ภาค ก.</text>
</svg>
